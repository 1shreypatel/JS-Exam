<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    .main-card {
      border: none;
      border-radius: 20px;
      overflow: hidden;
    }

    .product-card {
      border: none;
      border-radius: 18px;
      overflow: hidden;
      transition: .3s;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
    }

    .product-card img {
      height: 220px;
      object-fit: cover;
    }

    .badge-category {
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 30px;
    }
  </style>
</head>

<body>

  <div class="container py-5">

    <div class="card shadow-lg main-card p-4">
      <h2 class="text-center mb-4 fw-bold">Add Product</h2>

      <form id="productForm" class="row g-3">
        <div class="col-md-3">
          <input type="text" class="form-control" id="name" placeholder="Product Name" required>
        </div>

        <div class="col-md-2">
          <input type="number" class="form-control" id="price" placeholder="Price" required>
        </div>

        <div class="col-md-3">
          <input type="url" class="form-control" id="url" placeholder="Image URL" required>
        </div>

        <div class="col-md-2">
          <select id="category" class="form-select" required>
            <option value="">Category</option>
            <option>Electronics</option>
            <option>Fashion</option>
            <option>Books</option>
            <option>Home</option>
          </select>
        </div>

        <div class="col-md-2">
          <button class="btn btn-primary w-100">Submit</button>
        </div>
      </form>
    </div>

    <div class="row mt-5 g-3">
      <div class="col-md-4">
        <input type="text" id="searchInput" class="form-control" placeholder=" Search by Title">
      </div>

      <div class="col-md-4">
        <select id="sortPrice" class="form-select">
          <option value="">Sort by Price</option>
          <option value="low">Low to High</option>
          <option value="high">High to Low</option>
        </select>
      </div>

      <div class="col-md-4">
        <select id="filterCategory" class="form-select">
          <option value="">Filter by Category</option>
          <option>Electronics</option>
          <option>Fashion</option>
          <option>Books</option>
          <option>Home</option>
        </select>
      </div>
    </div>

    <hr>

    <h3>Prodect List</h3>

    <div class="row mt-5" id="productContainer"></div>

  </div>

  <script>
    const form = document.getElementById("productForm");
    const productContainer = document.getElementById("productContainer");

    const searchInput = document.getElementById("searchInput");
    const sortPrice = document.getElementById("sortPrice");
    const filterCategory = document.getElementById("filterCategory");

    let editIndex = null;

    function getProducts() {
      return JSON.parse(localStorage.getItem("products")) || [];
    }

    function saveProducts(products) {
      localStorage.setItem("products", JSON.stringify(products));
    }

    function displayProducts() {
      let products = getProducts();

      const searchValue = searchInput.value.toLowerCase();
      const categoryValue = filterCategory.value;
      const sortValue = sortPrice.value;

      if (searchValue) {
        products = products.filter(p =>
          p.name.toLowerCase().includes(searchValue)
        );
      }

      if (categoryValue) {
        products = products.filter(p =>
          p.category === categoryValue
        );
      }

      if (sortValue === "low") {
        products.sort((a, b) => a.price - b.price);
      } else if (sortValue === "high") {
        products.sort((a, b) => b.price - a.price);
      }

      productContainer.innerHTML = "";

      if (products.length === 0) {
        productContainer.innerHTML = `
          <h4 class="text-center text-muted mt-5">No Products Found</h4>
        `;
        return;
      }

      products.forEach((product) => {
        const originalIndex = getProducts().findIndex(
          p =>
            p.name === product.name &&
            p.price == product.price &&
            p.url === product.url &&
            p.category === product.category
        );

        productContainer.innerHTML += `
          <div class="col-md-4 mb-4">
            <div class="card shadow product-card h-100">
              <img src="${product.url}" class="card-img-top">

              <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <h5>${product.name}</h5>
                  <span class="badge bg-primary badge-category">${product.category}</span>
                </div>

                <p class="text-success fw-bold fs-5">${product.price}</p>

                <div class="d-flex gap-2">
                  <button class="btn btn-warning btn-sm w-50" onclick="editProduct(${originalIndex})">Edit</button>
                  <button class="btn btn-danger btn-sm w-50" onclick="deleteProduct(${originalIndex})">Delete</button>
                </div>
              </div>
            </div>
          </div>
        `;
      });
    }

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const price = document.getElementById("price").value;
      const url = document.getElementById("url").value;
      const category = document.getElementById("category").value;

      const products = getProducts();

      const product = { name, price, url, category };

      if (editIndex === null) {
        products.push(product);
      } else {
        products[editIndex] = product;
        editIndex = null;
      }

      saveProducts(products);

      form.reset();
      displayProducts();
    });

    function deleteProduct(index) {
      const products = getProducts();
      products.splice(index, 1);
      saveProducts(products);
      displayProducts();
    }

    function editProduct(index) {
      const products = getProducts();
      const product = products[index];

      document.getElementById("name").value = product.name;
      document.getElementById("price").value = product.price;
      document.getElementById("url").value = product.url;
      document.getElementById("category").value = product.category;

      editIndex = index;
    }

    searchInput.addEventListener("input", displayProducts);
    sortPrice.addEventListener("change", displayProducts);
    filterCategory.addEventListener("change", displayProducts);

    displayProducts();
  </script>

</body>

</html>
